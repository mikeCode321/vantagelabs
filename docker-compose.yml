services:
  postgres:
    build: ./postgres-db
    image: postgres-img
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: vlabs_db
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    image: backend-img
    container_name: fastapi-backend
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://myuser:password@postgres:5432/vlabs_db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    image: frontend-img
    container_name: frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      
volumes:
  postgres_data:
  frontend_node_modules: